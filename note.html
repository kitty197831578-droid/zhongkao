<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>我的成长错题本 · 孔老师</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:#f7f4f0;color:#2c2c2c;line-height:1.7;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#8b7e74,#a8a09a);color:#fff;padding:20px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.header .sub{font-size:12px;opacity:.7;margin-top:2px}
.nav{display:flex;gap:6px;margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav button{flex-shrink:0;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:18px;font-size:13px;cursor:pointer;transition:.25s}
.nav button:hover{background:rgba(255,255,255,.28)}
.nav button.active{background:#fff;color:#5a4f46;font-weight:600}
.main{max-width:800px;margin:0 auto;padding:20px 16px 60px}
.page{display:none}.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-c{border-radius:10px;padding:16px 10px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);border:1px solid #ede8e0}
.stat-c:nth-child(1){background:#e8f4f0;color:#3a8b7a}
.stat-c:nth-child(2){background:#f0eaf8;color:#7c5fa0}
.stat-c:nth-child(3){background:#fef6e6;color:#b8862a}
.stat-n{font-size:30px;font-weight:700;line-height:1.2}
.stat-l{font-size:12px;margin-top:1px;opacity:.8}
.recent{background:#fff;border-radius:10px;border:1px solid#ede8e0;overflow:hidden}
.recent-h{padding:14px 16px 10px;font-size:14px;font-weight:600;color:#5a4f46;border-bottom:1px solid#f0ebe4}
.entry{padding:13px 16px;border-bottom:1px solid#f0ebe4;cursor:pointer;transition:.2s}
.entry:last-child{border-bottom:none}
.entry:active{background:#f0ebe4}
.entry-m{font-size:11px;color:#aaa39b;display:flex;gap:8px;margin-bottom:3px}
.entry-t{font-size:14px;font-weight:500}
.entry-p{font-size:12px;color:#8f857b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.entry-d{font-size:11px;color:#bbb3ab}
.empty{text-align:center;padding:36px 16px;color:#bbb3ab}
.empty .ic{font-size:36px}.empty p{font-size:13px;margin-top:4px}
.form-c{background:#fff;border-radius:10px;border:1px solid#ede8e0;padding:20px;margin-bottom:16px}
.form-c h2{font-size:15px;font-weight:600;color:#5a4f46;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:500;color:#5a4f46;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid#ddd8d1;border-radius:8px;font-size:14px;background:#fefcf9;transition:.2s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#a8a09a;box-shadow:0 0 0 3px rgba(168,160,154,.15)}
.fg textarea{min-height:64px;resize:vertical}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.flex2{grid-template-columns:1fr}}
.btn-pri{background:#8b7e74;color:#fff;border:none;padding:10px 0;border-radius:8px;font-size:14px;cursor:pointer;transition:.25s;font-weight:500;width:100%;text-align:center}
.btn-pri:hover{background:#73665b}
.btn-pri:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{background:#f0ebe4;color:#5a4f46;border:none;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;transition:.2s}
.btn-sec:hover{background:#e5ddd4}
.btn-dan{background:#f5e6e4;color:#b55a4a;border:none;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;transition:.2s}
.btn-dan:hover{background:#eed4d0}
.filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter select,.filter input{padding:6px 10px;border:1px solid#ddd8d1;border-radius:7px;font-size:12px;background:#fff}
.filter input{flex:1;min-width:100px}
.detail{background:#fff;border-radius:10px;border:1px solid#ede8e0;padding:20px}
.detail h2{font-size:18px;font-weight:600;margin-bottom:4px}
.detail .m{font-size:12px;color:#8f857b;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap}
.ds{margin-top:14px}
.ds h3{font-size:13px;font-weight:600;color:#5a4f46;margin-bottom:4px;padding-left:8px;border-left:3px solid#bfb6ad}
.ds p{font-size:13px;line-height:1.8;white-space:pre-wrap}
.da{margin-top:18px;display:flex;gap:8px}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.tags .tag{background:#f0ebe4;padding:2px 8px;border-radius:8px;font-size:11px;color:#5a4f46}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,.92);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .35s;z-index:999;pointer-events:none;white-space:nowrap;max-width:85vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>📓 我的成长错题本</h1>
  <div class="sub">把每一天的经历变成经验 · 孔祥旖</div>
  <div class="nav" id="nav">
    <button class="active" data-page="dash">📊 总览</button>
    <button data-page="add">✏️ 记录</button>
    <button data-page="list">📖 浏览</button>
  </div>
</div>
<div class="main" id="app">
<div class="page active" id="page-dash">
  <div class="stats" id="stats"></div>
<div style="margin-bottom:16px"><button class="btn-sec" id="syncBtn" onclick="syncToGitHub()" style="width:100%;text-align:center;padding:10px;font-size:13px">☁️ 同步到 GitHub</button></div>
  <div class="recent">
    <div class="recent-h">最近记录</div>
    <div id="recent"></div>
  </div>
</div>
<div class="page" id="page-add">
  <div class="form-c">
    <h2>✏️ 记录一条新反思</h2>
    <div class="fg"><label>标题 <span style="color:#b55a4a">*</span></label><input id="t" placeholder="例如：今天《纳米技术》那节课的遗憾"></div>
    <div class="flex2">
      <div class="fg"><label>分类</label><select id="c"><option value="教学反思">🍎 教学反思</option><option value="班级管理">📋 班级管理</option><option value="个人成长">🌱 个人成长</option></select></div>
      <div class="fg"><label>标签（逗号分隔）</label><input id="tags" placeholder="如：课堂互动, 三年级"></div>
    </div>
    <div class="fg"><label>📌 情境 / 问题</label><textarea id="s" rows="3" placeholder="当时发生了什么？遇到了什么问题？"></textarea></div>
    <div class="fg"><label>💡 我的反思</label><textarea id="r" rows="3" placeholder="为什么需要改进？学到了什么？"></textarea></div>
    <div class="fg"><label>🛠️ 改进方案</label><textarea id="i" rows="2" placeholder="下次我会怎么做？"></textarea></div>
    <div class="fg"><label>🔁 后续追踪（可选）</label><textarea id="f" rows="2" placeholder="后来试了吗？效果怎么样？"></textarea></div>
    <button class="btn-pri" id="save" onclick="save()">💾 保存记录</button>
  </div>
</div>
<div class="page" id="page-list">
  <div class="filter"><select id="fc" onchange="render()"><option value="">全部分类</option><option value="教学反思">🍎 教学反思</option><option value="班级管理">📋 班级管理</option><option value="个人成长">🌱 个人成长</option></select><input id="fs" placeholder="搜索…" inputmode="search" oninput="render()"><button class="btn-sec" onclick="exp()">📥 导出</button><button class="btn-sec" onclick="document.getElementById('imp').click()">📤 导入</button><input id="imp" type="file" accept=".json" style="display:none" onchange="imp(event)"></div>
  <div id="list"><div class="empty"><div class="ic">📝</div><p>还没有记录</p></div></div>
</div>
<div class="page" id="page-detail">
  <div class="detail" id="det"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const K='growthEntries';let D=[];

function L(){try{D=JSON.parse(localStorage.getItem(K))||[]}catch(e){D=[]}}
function S(){localStorage.setItem(K,JSON.stringify(D))}

document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.getElementById('page-'+b.dataset.page).classList.add('active');
    if(b.dataset.page==='dash') dash();
    if(b.dataset.page==='list') render();
  });
});

function go(p){document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.page===p));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(p==='dash')dash();if(p==='list')render();}

function T(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

function dash(){
  L();
  const o={'教学反思':0,'班级管理':0,'个人成长':0};
  D.forEach(e=>{if(o[e.c]!==undefined)o[e.c]++});
  const map=[{l:'教学反思',n:o['教学反思'],cl:'#3a8b7a'},{l:'班级管理',n:o['班级管理'],cl:'#7c5fa0'},{l:'个人成长',n:o['个人成长'],cl:'#b8862a'}];
  document.getElementById('stats').innerHTML=map.map(s=>'<div class="stat-c"><div class="stat-n" style="color:'+s.cl+'">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>').join('');
  const r=[...D].sort((a,b)=>new Date(b.a)-new Date(a.a)).slice(0,8);
  document.getElementById('recent').innerHTML=r.length?r.map(e=>eh(e)).join(''):'<div class="empty"><div class="ic">📝</div><p>还没有记录，去写第一条吧！</p></div>';
}

function eh(e){
  const cl=e.c==='教学反思'?'cat-teach':e.c==='班级管理'?'cat-manage':'cat-grow';
  const d=new Date(e.a);
  const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const p=(e.s||e.r||'').slice(0,50);
  return '<div class="entry" onclick="view('+e.id+')"><div class="entry-m"><span class="cat-tag emp">'+e.c+'</span><span class="entry-d">'+ds+'</span></div><div class="entry-t">'+(e.ti||'无标题')+'</div><div class="entry-p">'+esc(p)+(p.length>=50?'…':'')+'</div></div>';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function save(){
  const ti=document.getElementById('t').value.trim();
  if(!ti){T('请填写标题');document.getElementById('t').focus();return}
  const btn=document.getElementById('save');
  btn.disabled=true;btn.textContent='保存中…';
  L();
  const e={id:Date.now()+'_'+Math.random().toString(36).slice(2,6),ti, c:document.getElementById('c').value, tags:document.getElementById('tags').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean), s:document.getElementById('s').value.trim(), r:document.getElementById('r').value.trim(), i:document.getElementById('i').value.trim(), f:document.getElementById('f').value.trim(), a:new Date().toISOString()};
  D.unshift(e);S();
  ['t','tags','s','r','i','f'].forEach(id=>document.getElementById(id).value='');
  T('✅ 记录已保存');go('dash');
  btn.disabled=false;btn.textContent='💾 保存记录';
}

function render(){
  L();
  const cat=document.getElementById('fc').value,q=document.getElementById('fs').value.trim().toLowerCase();
  let f=D;if(cat)f=f.filter(e=>e.c===cat);
  if(q)f=f.filter(e=>(e.ti||'').toLowerCase().includes(q)||(e.s||'').toLowerCase().includes(q)||(e.r||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q)));
  const sorted=[...f].sort((a,b)=>new Date(b.a)-new Date(a.a));
  const c=document.getElementById('list');
  if(!sorted.length){c.innerHTML='<div class="empty"><div class="ic">🔍</div><p>没有匹配的记录</p></div>';return}
  c.innerHTML='<div class="recent">'+sorted.map(e=>eh(e)).join('')+'</div>';
}

function view(id){
  L();
  const e=D.find(x=>x.id===id);
  if(!e){T('记录不存在');return}
  const d=new Date(e.a);
  const ds=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const tagsHtml=(e.tags&&e.tags.length)?'<div class="tags">'+e.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')+'</div>':'';
  document.getElementById('det').innerHTML='<button class="btn-sec" onclick="go(\'list\')">← 返回列表</button><h2>'+esc(e.ti)+'</h2><div class="m"><span>'+esc(e.c)+'</span><span>'+ds+'</span></div>'+tagsHtml+(e.s?'<div class="ds"><h3>📌 情境 / 问题</h3><p>'+esc(e.s)+'</p></div>':'')+(e.r?'<div class="ds"><h3>💡 我的反思</h3><p>'+esc(e.r)+'</p></div>':'')+(e.i?'<div class="ds"><h3>🛠️ 改进方案</h3><p>'+esc(e.i)+'</p></div>':'')+(e.f?'<div class="ds"><h3>🔁 后续追踪</h3><p>'+esc(e.f)+'</p></div>':'')+'<div class="da"><button class="btn-dan" onclick="del('+e.id+')">🗑️ 删除</button></div>';
  go('detail');
}

function del(id){
  if(!confirm('确定删除？'))return;
  L();D=D.filter(e=>e.id!==id);S();T('已删除');go('list');
}

function exp(){
  L();
  if(!D.length){T('暂无数据');return}
  const rows=[['日期','分类','标题','标签','情境/问题','反思','改进方案','后续追踪']];
  D.forEach(e=>{const d=new Date(e.a);rows.push([`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,e.c,e.ti,(e.tags||[]).join('; '),e.s,e.r,e.i,e.f])});
  const csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='成长错题本_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);T('📥 导出成功');
}

function imp(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){L();D=data;S();T('✅ 导入成功 ('+data.length+'条)');render()}
      else T('文件格式错误');
    }catch(e){T('导入失败：文件格式不正确')}
  };
  reader.readAsText(file);
  e.target.value='';
}

dash();
</script>
<script>
// ── GitHub Sync ──
const GH_OWNER='kitty197831578-droid';const GH_REPO='zhongkao';const GH_BRANCH='main';const DATA_FILE='data.json';

async function loadFromGitHub(){
  try{
    const url='https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+DATA_FILE;
    const resp=await fetch(url);
    if(!resp.ok)return false;
    const remote=await resp.json();
    if(!Array.isArray(remote)||!remote.length)return false;
    L();
    const ids=new Set(D.map(e=>e.id));
    let merged=false;
    remote.forEach(e=>{if(!ids.has(e.id)){D.push(e);merged=true}});
    if(merged){S();return true}
    return false;
  }catch(e){return false}
}

function syncToGitHub(){
  L();
  if(!D.length){T('暂无数据可同步');return}
  const json=encodeURIComponent(JSON.stringify(D,null,2));
  window.open('https://github.com/'+GH_OWNER+'/'+GH_REPO+'/'+'new/'+GH_BRANCH+'?filename='+DATA_FILE+'&value='+json,'_blank');
  T('☁️ 打开新页面后直接点 Commit changes')
}

(async function(){
  try{
    const ok=await loadFromGitHub();
    if(ok){dash();T('☁️ 已从云端同步新数据')}
  }catch(e){}
})();
</script></body>
</html>
